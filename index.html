<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>舵机远程控制</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 40px 30px;
  width: 100%;
  max-width: 420px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.title {
  text-align: center;
  color: #fff;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}
.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  margin-bottom: 30px;
}
.angle-display {
  text-align: center;
  color: #fff;
  font-size: 64px;
  font-weight: 700;
  margin-bottom: 5px;
  transition: color 0.2s;
}
.angle-label {
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  margin-bottom: 30px;
}
.slider-container {
  position: relative;
  padding: 0 10px;
  margin-bottom: 30px;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:active {
  transform: scale(1.15);
}
input[type="range"]::-moz-range-thumb {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.labels {
  display: flex;
  justify-content: space-between;
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  margin-top: 10px;
}
.status {
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  margin-top: 20px;
  min-height: 20px;
}
.status.success { color: #2ecc71; }
.status.error { color: #e74c3c; }
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 25px;
}
.btn-group button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}
.btn-left {
  background: rgba(231,76,60,0.2);
  color: #e74c3c;
}
.btn-mid {
  background: rgba(243,156,18,0.2);
  color: #f39c12;
}
.btn-right {
  background: rgba(46,204,113,0.2);
  color: #2ecc71;
}
.btn-group button:active {
  transform: scale(0.95);
}
</style>
</head>
<body>
<div class="card">
  <div class="title">Servo Remote Control</div>
  <div class="subtitle">舵机远程控制 · GPIO13</div>
  <div class="angle-display" id="angleDisplay">90</div>
  <div class="angle-label">度</div>
  <div class="slider-container">
    <input type="range" id="slider" min="0" max="180" value="90" step="1">
    <div class="labels">
      <span>0° (右极限)</span>
      <span>90° (静止)</span>
      <span>180° (左极限)</span>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn-left" onclick="setAngle(0)">0°</button>
    <button class="btn-mid" onclick="setAngle(90)">90°</button>
    <button class="btn-right" onclick="setAngle(180)">180°</button>
  </div>
  <div class="status" id="status">拖动滑块控制舵机</div>
</div>

<script>
const UID = "02f9e7dd324f43e982ca59b55c2a7133";
const TOPIC = "Servo001";
const API_URL = "https://api.bemfa.com/api/device/v1/data/1/" + UID + "/" + TOPIC + "/";

const slider = document.getElementById("slider");
const angleDisplay = document.getElementById("angleDisplay");
const statusEl = document.getElementById("status");

var sendTimer = null;

function sendAngle(angle) {
  statusEl.className = "status";
  statusEl.textContent = "发送中...";

  new Image().src = API_URL + "?msg=" + angle + "&t=" + Date.now();

  clearTimeout(sendTimer);
  sendTimer = setTimeout(function() {
    statusEl.className = "status success";
    statusEl.textContent = "已发送: " + angle + "°";
  }, 500);
}

function setAngle(angle) {
  slider.value = angle;
  angleDisplay.textContent = angle;
  sendAngle(angle);
}

slider.addEventListener("input", function() {
  angleDisplay.textContent = this.value;
  sendAngle(this.value);
});
</script>
</body>
</html>

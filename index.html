<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>舵机远程控制</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 40px 30px;
  width: 100%;
  max-width: 420px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.title {
  text-align: center;
  color: #fff;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
}
.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  margin-bottom: 30px;
}
.angle-display {
  text-align: center;
  color: #fff;
  font-size: 64px;
  font-weight: 700;
  margin-bottom: 5px;
  transition: color 0.2s;
}
.angle-label {
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  margin-bottom: 30px;
}
.slider-container {
  position: relative;
  padding: 0 10px;
  margin-bottom: 30px;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
  outline: none;
  touch-action: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:active {
  transform: scale(1.15);
}
input[type="range"]::-moz-range-thumb {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.labels {
  display: flex;
  justify-content: space-between;
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  margin-top: 10px;
}
.status {
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  margin-top: 20px;
  min-height: 20px;
}
.status.success { color: #2ecc71; }
.status.active { color: #f39c12; }
.row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}
.row button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}
.row button:active {
  transform: scale(0.95);
}
.btn-0 { background: rgba(231,76,60,0.2); color: #e74c3c; }
.btn-90 { background: rgba(243,156,18,0.2); color: #f39c12; }
.btn-180 { background: rgba(46,204,113,0.2); color: #2ecc71; }
.btn-sweep {
  background: rgba(155,89,182,0.25);
  color: #bb8fce;
  border: 1px solid rgba(155,89,182,0.3);
}
.btn-sweep.active {
  background: rgba(231,76,60,0.25);
  color: #e74c3c;
  border-color: rgba(231,76,60,0.3);
}
</style>
</head>
<body>
<div class="card">
  <div class="title">Servo Remote Control</div>
  <div class="subtitle">舵机远程控制 · GPIO13</div>
  <div class="angle-display" id="angleDisplay">90</div>
  <div class="angle-label">度</div>
  <div class="slider-container">
    <input type="range" id="slider" min="0" max="180" value="90" step="1">
    <div class="labels">
      <span>0° (右极限)</span>
      <span>90° (静止)</span>
      <span>180° (左极限)</span>
    </div>
  </div>
  <div class="row">
    <button class="btn-0" onclick="setAngle(0)">0°</button>
    <button class="btn-90" onclick="setAngle(90)">90°</button>
    <button class="btn-180" onclick="setAngle(180)">180°</button>
  </div>
  <div class="row">
    <button class="btn-sweep" id="sweepBtn" onclick="toggleSweep()">▶ 往复运动</button>
  </div>
  <div class="status" id="status">拖动滑块控制舵机</div>
</div>

<script>
const UID = "02f9e7dd324f43e982ca59b55c2a7133";
const TOPIC = "Servo001";
const API_URL = "https://apis.bemfa.com/va/sendMessage?uid=" + UID + "&topic=" + TOPIC + "&type=1&msg=";

const slider = document.getElementById("slider");
const angleDisplay = document.getElementById("angleDisplay");
const statusEl = document.getElementById("status");
const sweepBtn = document.getElementById("sweepBtn");

var sendTimer = null;
var sweepTimer = null;
var sweepAngle = 0;
var sweepDir = 1;

function sendAngle(angle) {
  new Image().src = API_URL + angle + "&t=" + Date.now();

  clearTimeout(sendTimer);
  sendTimer = setTimeout(function() {
    statusEl.className = "status success";
    statusEl.textContent = "已发送: " + angle + "°";
  }, 300);
}

function setAngle(angle) {
  slider.value = angle;
  angleDisplay.textContent = angle;
  sendAngle(angle);
}

slider.addEventListener("input", function() {
  angleDisplay.textContent = this.value;
  sendAngle(this.value);
});

function toggleSweep() {
  if (sweepTimer) {
    clearInterval(sweepTimer);
    sweepTimer = null;
    sweepBtn.textContent = "▶ 往复运动";
    sweepBtn.classList.remove("active");
    slider.disabled = false;
    statusEl.className = "status success";
    statusEl.textContent = "往复停止";
    return;
  }

  sweepBtn.textContent = "■ 停止";
  sweepBtn.classList.add("active");
  slider.disabled = true;
  statusEl.className = "status active";
  statusEl.textContent = "往复运动中...";

  sweepAngle = 0;
  sweepDir = 1;
  setAngle(0);

  sweepTimer = setInterval(function() {
    sweepAngle += sweepDir * 5;
    if (sweepAngle >= 180) {
      sweepAngle = 180;
      sweepDir = -1;
    } else if (sweepAngle <= 0) {
      sweepAngle = 0;
      sweepDir = 1;
    }
    setAngle(sweepAngle);
  }, 200);
}
</script>
</body>
</html>
